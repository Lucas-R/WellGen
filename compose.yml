services:
  db:
    image: postgres:13
    container_name: wellgen_bd
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wellgen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d wellgen"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - wellgen-network

  api:
    container_name: wellgen_api
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: wellgen
    volumes:
      - ./api:/api
      - /api/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wellgen-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: wellgen_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - wellgen-network

volumes:
  postgres_data:

networks:
  wellgen-network:
    driver: bridge